name: Stats Card Generate

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate snake
        uses: Platane/snk/svg-only@e2cedf76a2c05b25d09a6428ded69727b497a700
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            stats/github-contribution-grid-snake.svg

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./stats
          publish_branch: stats
